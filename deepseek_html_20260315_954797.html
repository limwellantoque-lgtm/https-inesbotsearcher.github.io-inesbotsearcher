<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>InesBotV1 Word Searcher</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div class="container">
        <header>
            <h1>📚 InesBotV1 Word Searcher</h1>
            <p class="subtitle">Search words from Yinglish word list</p>
        </header>

        <main>
            <div class="controls-section">
                <div class="filter-group">
                    <label for="prefix-input">Starts with:</label>
                    <input type="text" id="prefix-input" placeholder="e.g., 'app'">
                </div>
                
                <div class="filter-group">
                    <label for="suffix-input">Ends with:</label>
                    <input type="text" id="suffix-input" placeholder="e.g., 'ing'">
                </div>

                <div class="sort-group">
                    <label>Sort by:</label>
                    <div class="radio-group">
                        <label>
                            <input type="radio" name="sort" value="none" checked> None
                        </label>
                        <label>
                            <input type="radio" name="sort" value="shortest"> Shortest first
                        </label>
                        <label>
                            <input type="radio" name="sort" value="longest"> Longest first
                        </label>
                        <label>
                            <input type="radio" name="sort" value="alpha"> Alphabetical
                        </label>
                    </div>
                </div>

                <div class="button-group">
                    <button id="search-btn" class="primary-btn">🔍 InesBotV1 Search</button>
                    <button id="load-words-btn" class="secondary-btn">📂 Load Yinglish Words</button>
                    <button id="clear-btn" class="secondary-btn">🗑️ Clear Results</button>
                </div>

                <div class="stats-group">
                    <p>Words loaded: <span id="word-count">0</span></p>
                    <p>Results shown: <span id="result-count">0</span></p>
                </div>
            </div>

            <div class="results-section">
                <div class="results-header">
                    <h2>Results</h2>
                    <p class="info-text">Showing top 20 results</p>
                </div>
                <div id="results-box" class="results-box">
                    <p class="placeholder-text">Click "Load Yinglish Words" to begin...</p>
                </div>
            </div>
        </main>

        <footer>
            <p>Word list sourced from <a href="https://github.com/hoshiyoshi-cpu/915247839457" target="_blank">Yinglish</a></p>
        </footer>
    </div>

    <script src="script.js"></script>
</body>
</html>
